<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0.25" y1="0" x2="0.75" y2="1">
      <stop offset="0%" stop-color="#252532"/>
      <stop offset="100%" stop-color="#16161c"/>
    </linearGradient>
    <radialGradient id="shine" cx="38%" cy="28%" r="62%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.065"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="54%" r="42%">
      <stop offset="0%" stop-color="#3a3a5c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3a3a5c" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="shape">
