  <g clip-path="url(#shape)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#shine)"/>
    <rect width="1024" height="1024" fill="url(#glow)"/>

    <line x1="0" y1="512" x2="1024" y2="512" stroke="white" stroke-width="1" opacity="0.025"/>
    <line x1="512" y1="0" x2="512" y2="1024" stroke="white" stroke-width="1" opacity="0.025"/>

    <text x="512" y="518"
          text-anchor="middle" dominant-baseline="middle"
          font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="600" font-weight="700" fill="#edeae2">#</text>

    <text x="512" y="886"
          text-anchor="middle" dominant-baseline="middle"
          font-family="'SF Mono', 'JetBrains Mono', 'Fira Mono', monospace"
          font-size="58" font-weight="500" letter-spacing="5" fill="#38384a">.md</text>

    <rect x="412" y="940" width="200" height="4" rx="2" fill="#3d7eff" opacity="0.55"/>
  </g>

  <rect width="1024" height="1024" rx="230" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
